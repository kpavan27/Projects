<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Energy Demand Forecasting | AI Insights</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>Energy Demand Forecasting</h1>
            <div class="subtitle">AI-Powered Short-Term Load Prediction</div>
        </header>
        
        <div class="dashboard-grid">
            <div class="info-container">
                <div class="info-text">
                    <h2>Real-time AI Monitoring</h2>
                    <p>Comparing actual grid load vs LSTM model forecasts in real-time</p>
                </div>
                <div id="prediction-output">
                    <span style="font-size: 1rem; color: #8b949e;">Waiting for data...</span>
                </div>
            </div>

            <div class="chart-container">
                <canvas id="energy-chart"></canvas>
            </div>
        </div>
    </div>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns/dist/chartjs-adapter-date-fns.bundle.min.js"></script>
    <script src="/static/script.js"></script>
</body>
</html>
